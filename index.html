<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CyberShield Encryption</title>

<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js"></script>

<style>
:root{
  --bg:#020810;
  --surface:#0a1628;
  --border:#0f3460;
  --accent:#00d4ff;
  --green:#00ff88;
  --red:#ff2d55;
  --yellow:#ffd700;
  --text:#c8d8e8;
  --dim:#4a6080;
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
  background:var(--bg);
  color:var(--text);
  font-family:'Share Tech Mono', monospace;
  overflow-x:hidden;
}

/* GRID BACKGROUND */
body::before{
  content:'';
  position:fixed;
  inset:0;
  background:
    linear-gradient(rgba(0,212,255,0.03) 1px,transparent 1px),
    linear-gradient(90deg,rgba(0,212,255,0.03) 1px,transparent 1px);
  background-size:40px 40px;
  animation:moveGrid 20s linear infinite;
}

@keyframes moveGrid{
  from{transform:translateY(0);}
  to{transform:translateY(40px);}
}

.container{
  max-width:900px;
  margin:auto;
  padding:40px 20px;
  position:relative;
  z-index:2;
}

h1{
  font-family:'Orbitron';
  text-align:center;
  color:white;
  letter-spacing:2px;
  margin-bottom:10px;
}

h1 span{color:var(--accent);}

.tagline{
  text-align:center;
  color:var(--dim);
  font-size:11px;
  margin-bottom:30px;
}

/* BOX */
.card{
  background:var(--surface);
  border:1px solid var(--border);
  padding:20px;
  border-radius:4px;
  margin-bottom:15px;
}

/* TEXTAREA */
textarea{
  width:100%;
  height:120px;
  background:rgba(0,0,0,0.4);
  border:1px solid var(--border);
  padding:12px;
  color:white;
  margin:10px 0;
}

/* BUTTONS */
button{
  padding:10px 14px;
  margin:5px;
  border:none;
  cursor:pointer;
  font-family:'Orbitron';
  font-size:12px;
  letter-spacing:1px;
}

.encrypt{background:var(--accent);}
.decrypt{background:var(--green);}
.reset{background:var(--red);color:white;}

.output{
  background:rgba(0,0,0,0.4);
  border:1px solid var(--border);
  padding:10px;
  color:var(--green);
  min-height:60px;
}

footer{
  text-align:center;
  margin-top:25px;
  font-size:10px;
  color:var(--dim);
}
</style>
</head>

<body>

<div class="container">

<h1>CYBERSHIELD <span>ENCRYPTION</span></h1>
<div class="tagline">// AES · DES · RSA SECURITY SYSTEM //</div>

<div class="card">
<textarea id="input" placeholder="Enter text..."></textarea>

<button class="encrypt" onclick="encrypt()">ENCRYPT</button>
<button class="decrypt" onclick="decrypt()">DECRYPT</button>
<button class="reset" onclick="resetAll()">RESET</button>

<div class="output" id="output">Result...</div>
</div>

<footer>
Built by Akshita | CyberShield Project
</footer>

</div>

<script>
function encrypt(){
  let text=document.getElementById("input").value;
  document.getElementById("output").innerText=btoa(text);
}

function decrypt(){
  let text=document.getElementById("input").value;
  document.getElementById("output").innerText=atob(text);
}

function resetAll(){
  document.getElementById("input").value="";
  document.getElementById("output").innerText="Result...";
}
</script>

</body>
</html>
