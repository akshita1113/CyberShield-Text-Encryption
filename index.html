<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Text Encryption — CyberShield</title>

<!-- FIXED GOOGLE FONT LINK -->
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">

<!-- CryptoJS (kept for support) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js"></script>

<style>
:root {
  --bg: #020810;
  --surface: #0a1628;
  --border: #0f3460;
  --accent: #00d4ff;
  --green: #00ff88;
  --yellow: #ffd700;
  --red: #ff2d55;
  --purple: #b44fff;
  --text: #c8d8e8;
  --dim: #4a6080;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Share Tech Mono', monospace;
  min-height: 100vh;
}

.container {
  max-width: 900px;
  margin: 0 auto;
  padding: 40px 20px;
  text-align: center;
}

h1 {
  font-family: 'Orbitron', monospace;
  color: var(--accent);
}

textarea {
  width: 100%;
  height: 120px;
  margin: 10px 0;
  padding: 10px;
}

button {
  margin: 5px;
  padding: 10px 14px;
  cursor: pointer;
  border-radius: 5px;
  border: none;
}

.btn-encrypt { background: var(--accent); color: black; }
.btn-decrypt { background: var(--green); color: black; }
.btn-clear { background: var(--red); color: white; }

.output {
  margin-top: 10px;
  padding: 10px;
  background: var(--surface);
  color: var(--green);
}
</style>
</head>

<body>

<div class="container">

<h1>🔐 CyberShield Encryption Tool</h1>

<textarea id="input" placeholder="Enter text"></textarea>

<br>

<button class="btn-encrypt" onclick="encrypt()">Encrypt</button>
<button class="btn-decrypt" onclick="decrypt()">Decrypt</button>
<button class="btn-clear" onclick="resetAll()">Reset</button>
<button onclick="copyText()">Copy</button>

<textarea id="output" placeholder="Result"></textarea>

</div>

<script>
function encrypt() {
  let text = document.getElementById("input").value;
  document.getElementById("output").value = btoa(text);
}

function decrypt() {
  let text = document.getElementById("input").value;
  document.getElementById("output").value = atob(text);
}

function copyText() {
  let text = document.getElementById("output").value;
  navigator.clipboard.writeText(text);
  alert("Copied!");
}

function resetAll() {
  document.getElementById("input").value = "";
  document.getElementById("output").value = "";
}
</script>

<footer style="margin-top:20px; font-size:10px; color:var(--dim);">
Built by Akshita | CyberShield Project
</footer>

</body>
</html>
